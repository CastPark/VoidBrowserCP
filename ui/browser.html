<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>VoidBrowser</title>
  <link rel="stylesheet" href="browser.css" />
</head>
<body>

  <div id="titlebar">
    <div id="chrome-left">
      <div id="tabs-container" role="tablist"></div>
      <button id="btn-new-tab" title="New Tab" aria-label="New Tab">
        <svg width="14" height="14" viewBox="0 0 14 14"><line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div id="titlebar-drag"></div>
    <div id="window-controls">
      <button id="btn-minimize" class="wc-btn" title="Minimize">
        <svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1.5" rx="0.75" fill="currentColor"/></svg>
      </button>
      <button id="btn-maximize" class="wc-btn" title="Maximize">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="1" y="1" width="8" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button id="btn-close" class="wc-btn wc-close" title="Close">
        <svg width="10" height="10" viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <div id="toolbar">
    <div id="nav-buttons">
      <button id="btn-back" class="nav-btn" title="Back" disabled>
        <svg width="14" height="14" viewBox="0 0 14 14"><polyline points="9,2 4,7 9,12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="btn-forward" class="nav-btn" title="Forward" disabled>
        <svg width="14" height="14" viewBox="0 0 14 14"><polyline points="5,2 10,7 5,12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="btn-reload" class="nav-btn" title="Reload">
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M12 7A5 5 0 1 1 9.5 2.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><polyline points="10,1 10,4 13,4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div id="addressbar-wrapper">
      <span id="site-favicon"></span>
      <span id="lock-icon" title="Secure connection">
        <svg width="11" height="13" viewBox="0 0 11 13"><rect x="1" y="5.5" width="9" height="7" rx="2" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M3 5.5V3.5a2.5 2.5 0 0 1 5 0v2" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </span>
      <input id="addressbar" type="text" spellcheck="false" autocomplete="off" placeholder="Search or enter URL…" aria-label="Address bar" />
    </div>

    <div id="toolbar-right">
      <button id="adblock-badge" title="Ads blocked on this page" aria-haspopup="dialog" aria-expanded="false">
        <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" fill="none" stroke="currentColor" stroke-width="1.3"/><line x1="3" y1="3" x2="9" y2="9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <span id="block-count">0</span>
      </button>
      <div id="extensions-area"></div>
      <button id="btn-settings" class="toolbar-btn" title="Settings">
        <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="2.3" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.9 2.9l1.1 1.1M10 10l1.1 1.1M11.1 2.9L10 4M4 10l-1.1 1.1" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <div id="adblock-popover" class="hidden" role="dialog" aria-label="Adblocker controls">
    <div class="popover-header">
      <span>Adblocker</span>
      <span id="adblock-popover-count">0 blocked</span>
    </div>
    <label class="popover-toggle-row" for="adblock-enabled-toggle">
      <span>Enable adblocker</span>
      <input id="adblock-enabled-toggle" type="checkbox" />
    </label>
    <label class="popover-toggle-row" for="adblock-update-toggle">
      <span>Auto-update lists</span>
      <input id="adblock-update-toggle" type="checkbox" />
    </label>
    <div class="popover-actions">
      <button id="btn-adblock-refresh" class="popover-btn">Update lists</button>
      <button id="btn-adblock-settings" class="popover-btn">Open settings</button>
    </div>
  </div>

  <div id="command-bar-overlay" class="hidden" role="dialog" aria-modal="true" aria-label="Command bar">
    <div id="command-bar">
      <div id="command-bar-header">
        <span id="command-bar-icon">
          <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="6" cy="6" r="4.5" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="9.5" y1="9.5" x2="13" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </span>
        <input id="command-input" type="text" spellcheck="false" autocomplete="off" placeholder="Search or enter a URL…" aria-label="Command input" />
      </div>
      <div id="command-suggestions"></div>
    </div>
  </div>

  <div id="download-bar" class="hidden" role="region" aria-label="Downloads">
    <div id="download-bar-header">
      <span>Downloads</span>
      <button id="btn-downloads-folder" title="Open downloads folder">Open Folder</button>
      <button id="btn-downloads-close" title="Close">×</button>
    </div>
    <div id="download-list"></div>
  </div>

  <script src="browser.js"></script>
</body>
</html>
