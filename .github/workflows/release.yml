name: Build And Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish release assets
        run: npx electron-builder --config build/installer-builder.json --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build logs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-setup-logs
          path: |
            release-setup/builder-debug.yml
            release-setup/builder-effective-config.yaml
